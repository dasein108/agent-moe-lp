# Merchant Moe (Mantle) Farming Bot — Production Docker Compose
#
# Single-position LP management with automatic rebalancing
# Automatic rebalancing, Keltner channel analysis, Telegram alerts

services:
  moe-farm-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moe-mantle-farm-bot
    restart: unless-stopped

    volumes:
      - ./src:/app/src:ro
      - ./scripts:/app/scripts:ro
      - ./data:/app/data
      - ./wallet.json:/app/wallet.json:ro
      - ./.env:/app/.env:ro

    environment:
      - PYTHONPATH=/app/src
      - PYTHONDONTWRITEBYTECODE=1
      # Log file inside the data volume for persistence
      - MOE_LOG_FILE=/app/data/farm_bot.log

    working_dir: /app
    env_file:
      - .env

    # --strategy auto: MTF-aware Keltner selection (narrow in trends, wide in ranges)
    command: [
      "python3", "-m", "moe_mantle_bot.farm_bot",
      "--live",
      "--poll-interval-seconds", "300"
    ]

    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "10"

    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'
        reservations:
          memory: 256M
          cpus: '0.25'

    networks:
      - moe-farm-network

    healthcheck:
      test: ["CMD", "python3", "-c", "import sys; sys.path.insert(0, '/app/src'); from moe_mantle_bot.config import Settings; Settings.from_env(); print('ok')"]
      interval: 60s
      timeout: 15s
      retries: 3
      start_period: 30s

networks:
  moe-farm-network:
    driver: bridge
